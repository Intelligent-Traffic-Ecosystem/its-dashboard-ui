services:
  b3-backend:
    image: ${B3_BACKEND_IMAGE:-its-b3-backend:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "${B3_BACKEND_PORT:-5000}:5000"
    environment:
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-production}
      KEYCLOAK_URL: ${KEYCLOAK_URL:?Missing KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:?Missing KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:?Missing KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:?Missing KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI:?Missing KEYCLOAK_REDIRECT_URI}
      ADMIN_DASHBOARD_URL: ${ADMIN_DASHBOARD_URL:?Missing ADMIN_DASHBOARD_URL}
      TRAFFIC_DASHBOARD_URL: ${TRAFFIC_DASHBOARD_URL:?Missing TRAFFIC_DASHBOARD_URL}
      LOGIN_APP_URL: ${LOGIN_APP_URL:?Missing LOGIN_APP_URL}
      DEV_LOGIN_REDIRECT_PATH: ${DEV_LOGIN_REDIRECT_PATH:?Missing DEV_LOGIN_REDIRECT_PATH}
      DEV_LOGIN_DASHBOARD_URL: ${DEV_LOGIN_DASHBOARD_URL:?Missing DEV_LOGIN_DASHBOARD_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?Missing ALLOWED_ORIGINS}
      SWAGGER_SERVER_URL: ${SWAGGER_SERVER_URL:?Missing SWAGGER_SERVER_URL}
      B2_API_BASE_URL: ${COMPOSE_B2_API_BASE_URL:-http://host.docker.internal:8000}
      B2_WS_URL: ${COMPOSE_B2_WS_URL:-ws://host.docker.internal:8000/ws/metrics}
      B2_REQUEST_TIMEOUT_MS: ${B2_REQUEST_TIMEOUT_MS:-5000}
      B2_WS_RECONNECT_MS: ${B2_WS_RECONNECT_MS:-3000}
      TRAFFIC_STALE_AFTER_SECONDS: ${TRAFFIC_STALE_AFTER_SECONDS:-30}
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-true}
    restart: on-failure

  b3-traffic-dashboard:
    image: ${B3_TRAFFIC_DASHBOARD_IMAGE:-its-b3-traffic-dashboard:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.traffic-dashboard
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:?Missing NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_LOGIN_APP_URL: ${NEXT_PUBLIC_LOGIN_APP_URL:?Missing NEXT_PUBLIC_LOGIN_APP_URL}
        NEXT_PUBLIC_TRAFFIC_DASHBOARD_HOME_PATH: ${NEXT_PUBLIC_TRAFFIC_DASHBOARD_HOME_PATH:?Missing NEXT_PUBLIC_TRAFFIC_DASHBOARD_HOME_PATH}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_GOOGLE_MAPS_ID: ${NEXT_PUBLIC_GOOGLE_MAPS_ID:-}
        NEXT_PUBLIC_DEMO_MAP_PINS: ${NEXT_PUBLIC_DEMO_MAP_PINS:-true}
    depends_on:
      - b3-backend
    ports:
      - "${B3_TRAFFIC_DASHBOARD_PORT:-3000}:3000"
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:?Missing NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_LOGIN_APP_URL: ${NEXT_PUBLIC_LOGIN_APP_URL:?Missing NEXT_PUBLIC_LOGIN_APP_URL}
      NEXT_PUBLIC_TRAFFIC_DASHBOARD_HOME_PATH: ${NEXT_PUBLIC_TRAFFIC_DASHBOARD_HOME_PATH:?Missing NEXT_PUBLIC_TRAFFIC_DASHBOARD_HOME_PATH}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_GOOGLE_MAPS_ID: ${NEXT_PUBLIC_GOOGLE_MAPS_ID:-}
      NEXT_PUBLIC_DEMO_MAP_PINS: ${NEXT_PUBLIC_DEMO_MAP_PINS:-true}
    restart: on-failure

  b3-login:
    image: ${B3_LOGIN_IMAGE:-its-b3-login:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.login
      args:
        BACKEND_URL: ${BACKEND_URL:?Missing BACKEND_URL}
        NEXT_PUBLIC_AUTH_LOGIN_URL: ${NEXT_PUBLIC_AUTH_LOGIN_URL:?Missing NEXT_PUBLIC_AUTH_LOGIN_URL}
    depends_on:
      - b3-backend
    ports:
      - "${B3_LOGIN_PORT:-3003}:3003"
    environment:
      PORT: 3003
      NODE_ENV: ${NODE_ENV:-production}
      BACKEND_URL: ${BACKEND_URL:?Missing BACKEND_URL}
      NEXT_PUBLIC_AUTH_LOGIN_URL: ${NEXT_PUBLIC_AUTH_LOGIN_URL:?Missing NEXT_PUBLIC_AUTH_LOGIN_URL}
    restart: on-failure

  b3-admin-dashboard:
    image: ${B3_ADMIN_DASHBOARD_IMAGE:-its-b3-admin-dashboard:latest}
    build:
      context: .
      dockerfile: docker/Dockerfile.admin-dashboard
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:?Missing NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_LOGIN_APP_URL: ${NEXT_PUBLIC_LOGIN_APP_URL:?Missing NEXT_PUBLIC_LOGIN_APP_URL}
        NEXT_PUBLIC_AUTH_LOGIN_URL: ${NEXT_PUBLIC_AUTH_LOGIN_URL:?Missing NEXT_PUBLIC_AUTH_LOGIN_URL}
    depends_on:
      - b3-backend
    ports:
      - "${B3_ADMIN_DASHBOARD_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:?Missing NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_LOGIN_APP_URL: ${NEXT_PUBLIC_LOGIN_APP_URL:?Missing NEXT_PUBLIC_LOGIN_APP_URL}
      NEXT_PUBLIC_AUTH_LOGIN_URL: ${NEXT_PUBLIC_AUTH_LOGIN_URL:?Missing NEXT_PUBLIC_AUTH_LOGIN_URL}
    restart: on-failure
