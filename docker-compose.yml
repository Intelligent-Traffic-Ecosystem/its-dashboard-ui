services:

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI}
      ADMIN_DASHBOARD_URL: ${ADMIN_DASHBOARD_URL}
      TRAFFIC_DASHBOARD_URL: ${TRAFFIC_DASHBOARD_URL}
      LOGIN_APP_URL: ${LOGIN_APP_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DEV_BYPASS_AUTH: ${DEV_BYPASS_AUTH:-false}
    restart: unless-stopped

  login:
    build:
      context: ./apps/login
      args:
        NEXT_PUBLIC_ADMIN_DASHBOARD_URL: ${ADMIN_DASHBOARD_URL}
        NEXT_PUBLIC_TRAFFIC_DASHBOARD_URL: ${TRAFFIC_DASHBOARD_URL}
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      BACKEND_URL: ${BACKEND_INTERNAL_URL}
      KEYCLOAK_URL: ${KEYCLOAK_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI}
    depends_on:
      - backend
    restart: unless-stopped

  traffic-dashboard:
    build:
      context: ./apps/traffic-dashboard
      args:
        NEXT_PUBLIC_BACKEND_URL: ${BACKEND_PUBLIC_URL}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_GOOGLE_MAPS_ID: ${GOOGLE_MAPS_ID}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend
    restart: unless-stopped
